<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURELIUS v5.0 | Neural Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --theme-color: #475569; } 
        body { background: #020617; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; padding-top: env(safe-area-inset-top); transition: all 0.5s ease; }
        .neural-glow { background: linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05)); backdrop-filter: blur(12px); border: 1px solid var(--theme-color); }
        .crt-overlay { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01)); background-size: 100% 4px, 4px 100%; z-index: 50; }
        #neural-canvas { width: 100%; height: 160px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body class="p-4">
    <div class="crt-overlay"></div>

    <div class="neural-glow rounded-lg mb-4 overflow-hidden relative">
        <div class="absolute top-2 left-3 z-10 flex items-center gap-4">
            <h1 class="text-xs font-bold font-['Orbitron'] tracking-widest" style="color: var(--theme-color)">AURELIUS v5.0</h1>
            <span id="stat-admin" class="text-[10px] bg-white/5 px-2 py-0.5 rounded border border-white/10 uppercase">INITIALIZING...</span>
        </div>
        <div id="neural-canvas"></div>
    </div>

    <div id="main-console" class="flex gap-4 h-[calc(100vh-340px)]">
        <div class="w-1/3 flex flex-col gap-2">
            <div class="neural-glow p-3 rounded flex flex-col gap-4 flex-grow text-center">
                <div class="text-[9px] uppercase tracking-tighter text-slate-500">MESH_TELEMETRY</div>
                <div class="space-y-4 pt-2">
                    <div class="text-[9px] font-bold"><span id="dot-vision" class="status-dot bg-slate-600"></span>VIS: <span id="val-vision" class="text-slate-500">READY</span></div>
                    <div class="text-[9px] font-bold"><span id="dot-bio" class="status-dot bg-slate-600"></span>BIO: <span id="val-bio" class="text-slate-500">IDLE</span></div>
                </div>
            </div>
        </div>

        <div class="w-2/3 flex flex-col gap-2">
            <div id="chat-stream" class="neural-glow rounded p-3 flex-grow overflow-y-auto text-[10px] space-y-2">
                <div class="text-white/30 italic">[SYSTEM]: Link Established via Origin...</div>
            </div>
            
            <div class="flex gap-1">
                <input type="text" id="cmd-input" placeholder="BIOMETRIC AUTH REQUIRED" disabled class="bg-black/40 border border-white/10 rounded px-3 py-2 text-xs w-full outline-none opacity-50">
                <button id="btn-remote-auth" onclick="captureRemote()" class="bg-white/10 text-white px-3 rounded text-[10px] font-bold uppercase">📸 AUTH</button>
                <button id="btn-send" onclick="sendChat()" class="hidden bg-white text-black px-4 rounded font-bold text-[10px]">SEND</button>
            </div>
        </div>
    </div>

    <div id="control-grid" class="grid grid-cols-4 gap-2 mt-4 opacity-20 pointer-events-none">
        <button onclick="act('lock')" class="neural-glow py-3 rounded text-[9px] font-bold uppercase text-red-400">🔒 Lock</button>
        <button onclick="act('cam')" class="neural-glow py-3 rounded text-[9px] font-bold uppercase">📷 Cam</button>
        <button onclick="act('aux')" class="neural-glow py-3 rounded text-[9px] font-bold uppercase text-yellow-500">👤 Aux</button>
        <button onclick="act('purge')" class="neural-glow border-red-500/40 py-3 rounded text-[9px] font-bold uppercase text-red-600">🛡️ PURGE</button>
    </div>

    <video id="hidden-video" class="hidden" autoplay playsinline muted></video>
    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        // --- ADAPTIVE ORIGIN TARGETING ---
        // Setting to empty string forces the browser to use the current host/port.
        const NODE_URL = ""; 
        
        async function syncTelemetry() {
            try {
                const r = await fetch(`${NODE_URL}/status`);
                if (!r.ok) throw new Error();
                const d = await r.json();
                updateUI(d);
            } catch(e) { 
                document.getElementById('stat-admin').innerText = "MESH_OFFLINE"; 
                document.getElementById('stat-admin').className = "text-[10px] bg-red-900/20 px-2 py-0.5 rounded border border-red-500 text-red-500";
            }
        }

        function updateUI(data) {
            const role = data.role || "GUEST";
            const root = document.documentElement;
            const adminEl = document.getElementById('stat-admin');
            
            if (role === "ADMIN" || role === "AUX") {
                const isFullAdmin = role === "ADMIN";
                root.style.setProperty('--theme-color', isFullAdmin ? '#00ffff' : '#eab308');
                adminEl.innerText = `${role}: ${data.identity} ✅`;
                adminEl.className = `text-[10px] px-2 py-0.5 rounded border font-bold ${isFullAdmin ? 'bg-cyan-500/20 border-cyan-500 text-cyan-400' : 'bg-yellow-500/20 border-yellow-500 text-yellow-400'}`;
                document.getElementById('dot-bio').className = `status-dot ${isFullAdmin ? 'bg-cyan-400' : 'bg-yellow-400'}`;
                
                // Unlock Console
                document.getElementById('cmd-input').disabled = false;
                document.getElementById('cmd-input').placeholder = "COMMAND_ENTRY_ACTIVE";
                document.getElementById('cmd-input').classList.remove('opacity-50');
                document.getElementById('btn-send').classList.remove('hidden');
                document.getElementById('btn-remote-auth').classList.add('hidden');
                document.getElementById('control-grid').style.opacity = "1";
                document.getElementById('control-grid').style.pointerEvents = "auto";
            } else {
                root.style.setProperty('--theme-color', '#475569');
                adminEl.innerText = "LOCKED 🔒";
                adminEl.className = "text-[10px] bg-white/5 px-2 py-0.5 rounded border border-white/10 uppercase";
            }
        }

        async function captureRemote() {
            appendLog('SYSTEM', 'UPLOADING_BIO_HASH...');
            const video = document.getElementById('hidden-video');
            const canvas = document.getElementById('hidden-canvas');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                setTimeout(() => {
                    canvas.width = 640; canvas.height = 640;
                    const minDim = Math.min(video.videoWidth, video.videoHeight);
                    canvas.getContext('2d').drawImage(video, (video.videoWidth-minDim)/2, (video.videoHeight-minDim)/2, minDim, minDim, 0, 0, 640, 640);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    stream.getTracks().forEach(t => t.stop());

                    fetch(`${NODE_URL}/remote_auth`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ image_data: base64 })
                    })
                    .then(r => r.json())
                    .then(d => {
                        appendLog('SYSTEM', `AUTH_RESPONSE: ${d.role}`);
                        updateUI(d);
                    })
                    .catch(err => {
                        appendLog('ERROR', 'HANDSHAKE_REJECTED');
                    });
                }, 1000);
            } catch (err) { appendLog('ERROR', 'CAMERA_BLOCKED'); }
        }

        function appendLog(s, t) {
            const log = document.getElementById('chat-stream');
            const entry = document.createElement('div');
            entry.className = "text-cyan-400";
            entry.innerText = `[${s}]: ${t}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // --- VISUALS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 40) / 160, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 40, 160);
        document.getElementById('neural-canvas').appendChild(renderer.domElement);
        const brain = new THREE.Mesh(new THREE.IcosahedronGeometry(2.2, 1), new THREE.MeshBasicMaterial({ color: 0x475569, wireframe: true, transparent: true, opacity: 0.2 }));
        scene.add(brain); camera.position.z = 5;
        function animate() { 
            requestAnimationFrame(animate); 
            brain.material.color.set(getComputedStyle(document.documentElement).getPropertyValue('--theme-color'));
            brain.rotation.y += 0.003; 
            renderer.render(scene, camera); 
        }
        animate();
        setInterval(syncTelemetry, 3000);
    </script>
</body>
</html>
