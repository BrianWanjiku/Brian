<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AURELIUS v5.0 | Neural Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --theme-color: #475569; } /* Default Gen-Pop Grey */
        body { background: #020617; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; padding-top: env(safe-area-inset-top); transition: all 0.5s ease; }
        .neural-glow { background: linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05)); backdrop-filter: blur(12px); border: 1px solid var(--theme-color); }
        .crt-overlay { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01)); background-size: 100% 4px, 4px 100%; z-index: 50; }
        #neural-canvas { width: 100%; height: 160px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .admin-only, .aux-only { transition: opacity 0.3s; }
        .locked-blur { filter: blur(8px); pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body class="p-4">
    <div class="crt-overlay"></div>

    <div id="cam-container" class="hidden fixed top-24 right-6 w-40 h-32 neural-glow rounded overflow-hidden z-40 border-cyan-500/50">
        <img id="video-stream" src="" class="w-full h-full object-cover grayscale contrast-125">
    </div>

    <div class="neural-glow rounded-lg mb-4 overflow-hidden relative">
        <div class="absolute top-2 left-3 z-10 flex items-center gap-4">
            <h1 class="text-xs font-bold font-['Orbitron'] tracking-widest text-shadow-sm" style="color: var(--theme-color)">AURELIUS v5.0</h1>
            <span id="stat-admin" class="text-[10px] bg-white/5 px-2 py-0.5 rounded border border-white/10 uppercase">SCANNING...</span>
        </div>
        <div id="neural-canvas"></div>
    </div>

    <div id="main-console" class="flex gap-4 h-[calc(100vh-340px)]">
        <div class="w-1/3 flex flex-col gap-2">
            <div class="neural-glow p-3 rounded flex flex-col gap-4 flex-grow">
                <div class="text-[9px] uppercase tracking-tighter text-slate-500">Sensors</div>
                <div class="space-y-3">
                    <div class="text-[9px] font-bold"><span id="dot-vision" class="status-dot bg-slate-600"></span>VIS: <span id="val-vision">WAIT</span></div>
                    <div class="text-[9px] font-bold"><span id="dot-bio" class="status-dot bg-slate-600"></span>BIO: <span id="val-bio">IDLE</span></div>
                </div>
            </div>
        </div>

        <div class="w-2/3 flex flex-col gap-2">
            <div id="chat-stream" class="neural-glow rounded p-3 flex-grow overflow-y-auto text-[10px] space-y-2 leading-relaxed">
                <div class="text-white/30 italic">[SYSTEM]: Establish Biometric Link...</div>
            </div>
            
            <div class="flex gap-1">
                <input type="text" id="cmd-input" placeholder="LOCKED: BIOMETRIC AUTH REQUIRED" disabled class="bg-black/40 border border-white/10 rounded px-3 py-2 text-xs w-full outline-none opacity-50">
                <button id="btn-remote-auth" onclick="captureRemote()" class="bg-white/10 text-white px-3 rounded text-[10px] font-bold uppercase">📸 AUTH</button>
                <button id="btn-send" onclick="sendChat()" class="hidden bg-white text-black px-4 rounded font-bold text-[10px]">SEND</button>
            </div>
        </div>
    </div>

    <div id="control-grid" class="grid grid-cols-4 gap-2 mt-4 opacity-20 pointer-events-none">
        <button onclick="act('lock')" class="neural-glow py-3 rounded text-[9px] font-bold uppercase text-red-400">🔒 Lock</button>
        <button onclick="toggleCamera()" class="neural-glow py-3 rounded text-[9px] font-bold uppercase admin-only">📷 Cam</button>
        <button onclick="act('aux')" class="neural-glow py-3 rounded text-[9px] font-bold uppercase text-yellow-500">👤 Aux</button>
        <button onclick="act('purge')" class="neural-glow border-red-500/40 py-3 rounded text-[9px] font-bold uppercase text-red-600 col-span-1 admin-only">🛡️ PURGE</button>
    </div>

    <video id="hidden-video" class="hidden" autoplay playsinline></video>
    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        const NODE_URL = "http://eatmorevegetables.tailb7c548.ts.net:8000";
        let currentRole = "GUEST";

        async function syncTelemetry() {
            try {
                const r = await fetch(`${NODE_URL}/status`);
                const d = await r.json();
                updateUI(d);
            } catch(e) { document.getElementById('stat-admin').innerText = "NODE_OFFLINE"; }
        }

        function updateUI(data) {
            const role = data.role || "GUEST";
            const root = document.documentElement;
            const adminEl = document.getElementById('stat-admin');
            const cmdInput = document.getElementById('cmd-input');
            const controlGrid = document.getElementById('control-grid');
            
            // 1. Set Theme & Colors
            if (role === "ADMIN") {
                root.style.setProperty('--theme-color', '#00ffff');
                adminEl.className = "text-[10px] bg-cyan-500/20 px-2 py-0.5 rounded border border-cyan-500 text-cyan-400 font-bold";
                adminEl.innerText = "ADMIN: BRIAN ✅";
            } else if (role === "AUX_ADMIN") {
                root.style.setProperty('--theme-color', '#fbbf24');
                adminEl.className = "text-[10px] bg-yellow-500/20 px-2 py-0.5 rounded border border-yellow-500 text-yellow-500 font-bold";
                adminEl.innerText = "AUX: VERONICA ⚠️";
            } else {
                root.style.setProperty('--theme-color', '#475569');
                adminEl.innerText = "GEN_POP: LOCKED 🔒";
            }

            // 2. Lock/Unlock Interaction
            const isGuest = role === "GUEST";
            cmdInput.disabled = isGuest;
            cmdInput.placeholder = isGuest ? "LOCKED: BIOMETRIC AUTH REQUIRED" : "Neural Command...";
            cmdInput.style.opacity = isGuest ? "0.5" : "1";
            document.getElementById('btn-send').classList.toggle('hidden', isGuest);
            document.getElementById('btn-remote-auth').classList.toggle('hidden', !isGuest);
            controlGrid.style.opacity = isGuest ? "0.2" : "1";
            controlGrid.style.pointerEvents = isGuest ? "none" : "auto";

            // 3. Hide/Show Role Specifics
            document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', role !== 'ADMIN'));
        }

        async function captureRemote() {
            const video = document.getElementById('hidden-video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('hidden-canvas');
                canvas.width = 300; canvas.height = 300;
                canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
                const base64 = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(t => t.stop());
                
                fetch(`${NODE_URL}/remote_auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image_data: base64 })
                }).then(r => r.json()).then(d => {
                    appendLog('SYSTEM', `BIO_CHECK: ${d.role}`);
                    syncTelemetry();
                });
            }, 1000);
        }

        // Standard helpers...
        function appendLog(s, t) {
            const log = document.getElementById('chat-stream');
            const entry = document.createElement('div');
            entry.className = s === 'BRIAN' ? 'text-white' : 'text-cyan-400';
            entry.innerText = `[${s}]: ${t}`;
            log.appendChild(entry);
        }

        // Three.js Brain logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 40) / 160, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 40, 160);
        document.getElementById('neural-canvas').appendChild(renderer.domElement);
        const brain = new THREE.Mesh(new THREE.IcosahedronGeometry(2.2, 1), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 }));
        scene.add(brain); camera.position.z = 5;
        function animate() { 
            requestAnimationFrame(animate); 
            brain.material.color.set(getComputedStyle(document.documentElement).getPropertyValue('--theme-color'));
            brain.rotation.y += 0.003; 
            renderer.render(scene, camera); 
        }
        animate();
        setInterval(syncTelemetry, 3000);
    </script>
</body>
</html>
